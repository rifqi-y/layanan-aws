{% extends "base.html" %} {% block content %}
<div class="form-container">
  <h2>Lacak Status Dokumen</h2>
  <form action="{{ url_for('status_layanan') }}" method="POST">
    <label for="id_tracking">Masukkan ID Tracking:</label>
    <input
      type="text"
      id="id_tracking"
      name="id_tracking"
      placeholder="Contoh: A1B2C3D4"
      required
    />
    <button type="submit" class="btn">Cari</button>
  </form>

  {% if data %}
  <div class="result-card">
    <h3>Detail Pengajuan</h3>
    <p><strong>ID:</strong> {{ data.id_tracking }}</p>
    <p><strong>Nama:</strong> {{ data.nama }}</p>
    <p><strong>Layanan:</strong> {{ data.jenis }}</p>
    <p>
      <strong>Status Saat Ini:</strong> <span class="badge">{{ data.status }}</span>
    </p>
    {% if data.file_ktp %}
    <p><strong>Dokumen:</strong> <a href="https://{{ cf_domain }}/{{ data.file_ktp }}" target="_blank">Lihat KTP</a></p>
    {% endif %}
  </div>
  {% endif %}
</div>
{% endblock %}
